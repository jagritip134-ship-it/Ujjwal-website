<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Industrial Pumps & Spares Supplier | NCR B2B Distributor</title>
<meta name="description" content="Industrial monoblock & submersible pumps, spares, B2B supply in NCR. GST billing. Fast dispatch. Bulk enquiries welcome.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://yourdomain.com/">

<!-- Open Graph -->
<meta property="og:title" content="Industrial Pumps & Spares Supplier">
<meta property="og:description" content="B2B Industrial pump distributor in NCR. Bulk supply.">
<meta property="og:type" content="website">

<link rel="stylesheet" href="style.css">

<!-- Organization Schema -->
<script type="application/ld+json">
{
 "@context":"https://schema.org",
 "@type":"Organization",
 "name":"Your Company Name",
 "url":"https://yourdomain.com"
}
</script>

</head>
<body>

<header class="header">
    <div class="logo">Industrial Pumps</div>
    <input type="text" id="searchInput" placeholder="Search by name, SKU, brand, specs...">
    <div class="cart-badge" id="cartBadge">0</div>
</header>

<div class="container">

    <aside class="sidebar">
        <h3>Filters</h3>

        <select id="categoryFilter">
            <option value="">All Categories</option>
            <option value="monoblock">Monoblock</option>
            <option value="submersible">Submersible</option>
        </select>

        <select id="brandFilter">
            <option value="">All Brands</option>
            <option value="kirloskar">Kirloskar</option>
            <option value="cri">CRI</option>
        </select>

        <select id="hpFilter">
            <option value="">All HP</option>
            <option value="1">1 HP</option>
            <option value="3">3 HP</option>
        </select>

        <select id="voltageFilter">
            <option value="">All Voltage</option>
            <option value="230">230V</option>
            <option value="415">415V</option>
        </select>

        <label>
            <input type="checkbox" id="stockFilter">
            In Stock Only
        </label>

        <select id="sortFilter">
            <option value="">Sort By</option>
            <option value="az">Name A-Z</option>
            <option value="hpLow">HP Low-High</option>
            <option value="stock">Stock First</option>
        </select>

    </aside>

    <main>
        <div id="productGrid" class="grid"></div>
    </main>

</div>

<div id="enquiryBox" class="enquiry-box hidden">
    <h3>Enquiry List</h3>
    <ul id="enquiryList"></ul>
    <button id="whatsappBtn">Send WhatsApp</button>
</div>

<script src="app.js" defer></script>
</body>
</html>
